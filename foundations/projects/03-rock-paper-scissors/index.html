<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Rock, Paper, Scissors</title>
		<link rel="stylesheet" href="style.css" />
		<script
			src="https://kit.fontawesome.com/bc6122e952.js"
			crossorigin="anonymous"
			defer
		></script>
		<script src="script.js" defer></script>
	</head>
	<body>
		<header>
			<p>Rock, Paper, Scissors</p>
			<p>|</p>
			<p>
				<i class="fa-regular fa-hand-back-fist fa-rotate-90"></i>
				<i class="fa-regular fa-hand"></i>
				<i class="fa-regular fa-hand-scissors"></i>
			</p>
		</header>
		<main>
			<div class="row">
				<h2>Choose your weapon:</h2>
				<div class="weapon-row">
					<button
						id="rock"
						class="fa-regular fa-hand-back-fist fa-rotate-90"
					></button>

					<button id="paper" class="fa-regular fa-hand"></button>
					<button
						id="scissors"
						class="fa-regular fa-hand-scissors"
					></button>
				</div>
			</div>

			<div class="row">
				<h3>First to score 5 wins</h3>
				<div class="scoreboard">
					<div class="player">
						<p id="player-score">0</p>
						<p>Player</p>
					</div>

					<div class="computer">
						<p id="computer-score">0</p>
						<p>Computer</p>
					</div>
				</div>
			</div>
		</main>
		<footer>
			<p>
				<i class="fa-regular fa-hand-back-fist fa-rotate-90"></i>
				<i class="fa-regular fa-hand"></i>
				<i class="fa-regular fa-hand-scissors"></i>
			</p>
			<p>|</p>
			<p>Rock, Paper, Scissors &copy; 2024</p>
			<p>|</p>
			<p>Atomicnaut</p>
		</footer>
	</body>
</html>
